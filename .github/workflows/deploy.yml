name: Meal Prep Engine CI/CD pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
jobs:
    build-and-test:
        runs-on: ubuntu-latest
        steps: 
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.9'
                  cache: 'pip'

            - name: Install Project Dependencies
              run: |
                    python -m pip install --upgrade pip
                    # Install testing tools alongside core dependencies
                    pip install pytest httpx flake8
                    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

            - name: Lint with flake8 (Syntax & Styling Check)
              run: |
                    flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
                    flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

            - name: Create Database Directory Structure
              run: |
                mkdir -p src/data
                mkdir -p data
                mkdir -p instance

            - name: Run Test Suite Execution Matrix
              env: 
                DATABASE_URL: sqlite:///${{ github.workspace }}/src/data/test.db
                SQLITE_DB_PATH: ${{ github.workspace }}/src/data/test.db
              run: |
                # Force Python to recognize the root folder structure and run tests
                PYTHONPATH=. pytest


    deploy:
        needs: build-and-test
        runs-on: ubuntu-latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        steps:
          - name: Pipeline Complete Notification
            run: |
                echo "Success! All unit tests passed, and code syntax is clean."
                echo "The MealPrepApp engine is ready for deployment."