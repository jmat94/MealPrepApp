<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Prep Data Engine - Home</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --primary: #2563eb;
            --secondary: #10b981;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .welcome-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 { margin-top: 0; color: #0f172a; font-size: 28px; }
        p { color: #64748b; font-size: 16px; line-height: 1.6; margin-bottom: 30px; }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: block;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .btn-scaler { background-color: var(--primary); color: white; }
        .btn-scaler:hover { background-color: #1d4ed8; }
        .btn-creator { background-color: var(--secondary); color: white; }
        .btn-creator:hover { background-color: #059669; }
        .btn-docs { background-color: #e2e8f0; color: #334155; }
        .btn-docs:hover { background-color: #cbd5e1; }
        .status-badge {
            display: inline-block;
            background: #dcfce7;
            color: #15803d;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 16px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <div class="status-badge">⚡ Core Engine Online</div>
    <h1>Meal Prep Data Engine</h1>
    <p>Welcome to your central meal preparation control hub. Select an application management view below to interact with the database infrastructure pipelines.</p>
    
    <div class="btn-group">
        <a href="/ui/index.html" class="btn btn-scaler">Recipe Scaling Dashboard</a>
        <a href="/ui/add_recipe.html" class="btn btn-creator">Create New Recipe Template</a>
        <a href="/docs" class="btn btn-docs">📖 Interactive API Documentation</a>
    </div>
</div>

</body>
</html>
